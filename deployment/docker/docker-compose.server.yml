services:
  retrieval-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    restart: unless-stopped
    command:
      - "--model-id"
      - "${RETRIEVAL_RERANKER_MODEL:-Alibaba-NLP/gte-multilingual-reranker-base}"
      - "--port"
      - "80"
    expose:
      - "80"
    volumes:
      - ${HF_HOME_HOST_PATH:-/srv/safetyraise/huggingface}:/data

  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend.Dockerfile
      args:
        INSTALL_VIDEO_DEPS: ${INSTALL_VIDEO_DEPS:-false}
    image: safetyraise-backend:latest
    restart: unless-stopped
    depends_on:
      - retrieval-reranker
    env_file:
      - ../../.env.server
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      WORKFLOW_CONFIG_PATH: /app/backend/config/workflow.server.yaml
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_data:/app/backend/data
      - ${KBASE_HOST_PATH:-/srv/safetyraise/kbase}:/opt/ts-analysis/kbase:ro
      - ${MODELS_HOST_PATH:-/srv/safetyraise/models}:/opt/ts-analysis/models:ro

  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/frontend.Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    image: safetyraise-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    volumes:
      - ${FRONTEND_NGINX_HOST_PATH:-/srv/safetyraise/nginx}:/etc/nginx/conf.d:ro
      - ${LETSENCRYPT_CONF_HOST_PATH:-/srv/safetyraise/letsencrypt/conf}:/etc/letsencrypt:ro
      - ${LETSENCRYPT_WWW_HOST_PATH:-/srv/safetyraise/letsencrypt/www}:/var/www/certbot:ro

volumes:
  backend_data:
